# Minimal Dialogue Branch deployment: API + MariaDB, native authentication.
#
# Prerequisites:
#   1. Copy secrets.minimal.env.example to secrets.minimal.env and fill in your values.
#   2. Build or pull the dlb-web-service image:
#        docker build -t dlb-web-service -f apps/api/Dockerfile .
#      Or use a pre-built image from Docker Hub by replacing the 'build:' block with:
#        image: dialoguebranch/dlb-web-service:latest
#   3. Run from the platform/ root of the monorepo:
#        docker compose -f infrastructure/docker/docker-compose.minimal.yml up

name: dlb-minimal

services:

  # ---------------------------------------------------------------------------
  # MariaDB — relational database
  # ---------------------------------------------------------------------------

  mariadb:
    image: mariadb:11
    restart: unless-stopped
    env_file:
      - secrets.minimal.env
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Dialogue Branch Web Service — the API
  # ---------------------------------------------------------------------------

  dlb-web-service:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "8089:8089"
    env_file:
      - secrets.minimal.env
    environment:
      DLB_BASE_URL: http://localhost:8089/dlb-web-service
      DLB_AUTH_SERVICE: native
      DLB_MARIADB_HOST: mariadb
      DLB_MARIADB_USER: root

      DLB_MARIADB_DATABASE: dialoguebranch

volumes:
  mariadb_data:
