# Dialogue Branch — local development services.
#
# Starts MariaDB, phpMyAdmin, and Keycloak with hard-coded dev credentials.
# No configuration files are required. Run from infrastructure/docker/:
#
#   docker compose up -d                              # supporting services only
#   docker compose --profile api up -d                # also build and run the API
#   docker compose --profile api --profile bff up -d  # also build and run the API and the BFF
#   docker compose --profile variable-service up -d   # also build and run the mock variable service
#
# The web client (apps/web) authenticates through the BFF, not Keycloak directly — see
# apps/bff's Javadoc and the web client's vite.config.js dev-server proxy. Run both the API
# and the BFF profiles together when developing the web client locally.

name: dlb-dev

services:

  # ---------------------------------------------------------------------------
  # MariaDB — relational database
  # ---------------------------------------------------------------------------

  mariadb:
    image: mariadb:11
    container_name: dlb-dev-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: dev
    ports:
      - "3306:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./import/mariadb/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # phpMyAdmin — database browser
  # ---------------------------------------------------------------------------

  phpmyadmin:
    image: phpmyadmin:5
    container_name: dlb-dev-phpmyadmin
    environment:
      PMA_HOST: mariadb
      PMA_USER: root
      PMA_PASSWORD: dev
    ports:
      - "8100:80"
    depends_on:
      mariadb:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Keycloak — identity and access management
  #
  # The entrypoint injects the BFF's redirect URI into the realm export before
  # importing it (the dlb-bff client is confidential, its dev secret is set
  # directly in the realm export — dev-only, not used for any real deployment).
  # Override KEYCLOAK_BFF_REDIRECT_URI to point at a different deployed BFF
  # instance.
  #
  # The custom DLB login theme (../keycloak/themes/dlb) is mounted read-only and
  # applied via the realm export's "loginTheme": "dlb".
  # ---------------------------------------------------------------------------

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: dlb-dev-keycloak
    entrypoint:
      - /bin/sh
      - -c
      - |
        mkdir -p /opt/keycloak/data/import
        sed -e "s|__BFF_REDIRECT_URI__|$${KEYCLOAK_BFF_REDIRECT_URI}|" \
            -e "s|__BFF_POST_LOGOUT_REDIRECT_URI__|$${KEYCLOAK_BFF_POST_LOGOUT_REDIRECT_URI}|" \
          /opt/keycloak/data/import-source/dialoguebranch-realm.json \
          > /opt/keycloak/data/import/dialoguebranch-realm.json
        exec /opt/keycloak/bin/kc.sh start-dev --import-realm \
          --spi-theme--static-max-age=-1 --spi-theme--cache-themes=false --spi-theme--cache-templates=false
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: mariadb
      KC_DB_URL_HOST: mariadb
      KC_DB_USERNAME: root
      KC_DB_PASSWORD: dev
      KEYCLOAK_BFF_REDIRECT_URI: http://localhost:8082/login/oauth2/code/keycloak
      KEYCLOAK_BFF_POST_LOGOUT_REDIRECT_URI: http://localhost:8082/
    ports:
      - "8081:8080"
    volumes:
      - ./import/dialoguebranch-realm.json:/opt/keycloak/data/import-source/dialoguebranch-realm.json:ro
      - ../keycloak/themes/dlb:/opt/keycloak/themes/dlb:ro
    depends_on:
      mariadb:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Keycloak realm sync — adds any client missing from an already-existing realm
  #
  # --import-realm (above) only fires on a genuinely fresh realm; once a developer already has a
  # local MariaDB volume with the realm in it, re-mounting dialoguebranch-realm.json does nothing
  # on its own. This one-shot script fills that gap without touching any existing client or data
  # (see infrastructure/keycloak/sync-realm.py's docstring) — safe, and cheap, to run every time.
  # ---------------------------------------------------------------------------

  keycloak-sync:
    image: python:3.13-alpine
    container_name: dlb-dev-keycloak-sync
    volumes:
      - ./import/dialoguebranch-realm.json:/realm-export.json:ro
      - ../keycloak/sync-realm.py:/sync-realm.py:ro
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      KEYCLOAK_BFF_REDIRECT_URI: http://localhost:8082/login/oauth2/code/keycloak
      KEYCLOAK_BFF_POST_LOGOUT_REDIRECT_URI: http://localhost:8082/
    depends_on:
      keycloak:
        condition: service_started
    command: ["python3", "/sync-realm.py"]

  # ---------------------------------------------------------------------------
  # Dialogue Branch Web Service — the API (optional, start with --profile api)
  # ---------------------------------------------------------------------------

  dlb-web-service:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    profiles:
      - api
    container_name: dlb-dev-api
    environment:
      DLB_AUTH_KEYCLOAK_BASE_URL: http://keycloak:8080/
      # Browser-facing Keycloak URL, used to build the OAuth2 authorize/token URLs shown in
      # Swagger UI — differs from DLB_AUTH_KEYCLOAK_BASE_URL because the container-internal
      # "keycloak" hostname above is not reachable from the developer's browser.
      DLB_AUTH_KEYCLOAK_BROWSER_BASE_URL: http://localhost:8081/
      DLB_MARIADB_HOST: mariadb
      DLB_MARIADB_PASSWORD: dev
    ports:
      - "8089:8089"
    depends_on:
      mariadb:
        condition: service_healthy
      keycloak:
        condition: service_started

  # ---------------------------------------------------------------------------
  # Dialogue Branch BFF (optional, start with --profile bff, alongside --profile api)
  #
  # Backend-for-Frontend for the web client (apps/web) — see apps/bff's Javadoc.
  # ---------------------------------------------------------------------------

  bff:
    build:
      context: ../..
      dockerfile: apps/bff/Dockerfile
    profiles:
      - bff
    container_name: dlb-dev-bff
    environment:
      DLB_BFF_KEYCLOAK_BASE_URL: http://keycloak:8080/
      # Browser-facing Keycloak URL, used to redirect the browser for login/logout — differs
      # from DLB_BFF_KEYCLOAK_BASE_URL because the container-internal "keycloak" hostname above
      # is not reachable from the developer's browser.
      DLB_BFF_KEYCLOAK_BROWSER_BASE_URL: http://localhost:8081/
      DLB_BFF_API_BASE_URL: http://dlb-web-service:8089/dlb-web-service
      DLB_BFF_OAUTH2_CLIENT_SECRET: dev-secret
    ports:
      - "8082:8082"
    depends_on:
      keycloak-sync:
        condition: service_completed_successfully
      dlb-web-service:
        condition: service_started

  # ---------------------------------------------------------------------------
  # Mock External Variable Service (optional, start with --profile variable-service)
  #
  # A dummy implementation of the "External Variable Service" protocol, used to
  # test the dlb-web-service's integration with an external variable back-end.
  # To point dlb-web-service at it (e.g. when running the API via ./gradlew
  # bootRun locally, outside this compose stack), set:
  #   DLB_EXTERNAL_VARIABLE_SERVICE_ENABLED=true
  #   DLB_EXTERNAL_VARIABLE_SERVICE_URL=http://localhost:8090
  #   DLB_EXTERNAL_VARIABLE_SERVICE_API_KEY=dev
  # (matching the DLB_AUTH_API_KEY set below). If dlb-web-service runs inside
  # this compose stack instead, use DLB_EXTERNAL_VARIABLE_SERVICE_URL=http://mock-variable-service:8090.
  # ---------------------------------------------------------------------------

  mock-variable-service:
    build:
      context: ../..
      dockerfile: apps/mock-variable-service/Dockerfile
    profiles:
      - variable-service
    container_name: dlb-dev-mock-variable-service
    environment:
      DLB_AUTH_API_KEY: dev
    ports:
      - "8090:8090"

volumes:
  mariadb-data:
