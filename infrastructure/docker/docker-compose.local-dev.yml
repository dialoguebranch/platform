# Local development stack: Dialogue Branch Web Service + MariaDB + Keycloak.
#
# Prerequisites:
#   1. Copy secrets.env.example to secrets.env and fill in your values.
#   2. Build or pull the dlb-web-service image (see apps/api/DOCKER.md).
#   3. Run from this directory (infrastructure/docker/):
#        docker compose -f docker-compose.local-dev.yml up
#
# The dlb-web-service image is built locally from the monorepo source.
# To use a pre-built image from Docker Hub instead, replace the 'build:'
# block under dlb-web-service with:
#   image: dialoguebranch/dlb-web-service:latest

name: dlb-standalone

services:

  # ---------------------------------------------------------------------------
  # MariaDB — relational database used by both the API and Keycloak
  # ---------------------------------------------------------------------------

  mariadb:
    image: mariadb:11
    restart: unless-stopped
    env_file:
      - secrets.env
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./import/mariadb/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Keycloak — identity and access management
  # ---------------------------------------------------------------------------

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    restart: unless-stopped
    env_file:
      - secrets.env
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      KC_DB: mariadb
      KC_DB_URL_HOST: mariadb
      KC_DB_USERNAME: root
    entrypoint:
      - /bin/sh
      - -c
      - mkdir -p /opt/keycloak/data/import && sed -e "s/\(\"secret\"\s*:\s*\)\"[^\"]*\"/\1\"$$DLB_AUTH_KEYCLOAK_CLIENT_SECRET\"/" /opt/keycloak/data/import-source/dialoguebranch-realm.json > /opt/keycloak/data/import/dialoguebranch-realm.json && /opt/keycloak/bin/kc.sh start-dev --import-realm
    volumes:
      - ./import/dialoguebranch-realm.json:/opt/keycloak/data/import-source/dialoguebranch-realm.json
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 2>/dev/null && echo -e 'GET /realms/dialoguebranch HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s

  # ---------------------------------------------------------------------------
  # Dialogue Branch Web Service — the API
  # ---------------------------------------------------------------------------

  dlb-web-service:
    build:
      context: ../..
      dockerfile: apps/api/standalone.Dockerfile
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "8089:8089"
    env_file:
      - secrets.env
    environment:
      DLB_BASE_URL: http://localhost:8089/dlb-web-service
      DLB_AUTH_SERVICE: keycloak
      DLB_AUTH_KEYCLOAK_BASE_URL: http://keycloak:8080/
      DLB_AUTH_KEYCLOAK_REALM: dialoguebranch
      DLB_AUTH_KEYCLOAK_CLIENT_ID: dlb-web-service
      DLB_MARIADB_HOST: mariadb
      DLB_MARIADB_USER: root
      DLB_MARIADB_DATABASE: dialoguebranch

  # ---------------------------------------------------------------------------
  # Dialogue Branch Web Client — Vue 3 / Vite dev server
  # ---------------------------------------------------------------------------

  dlb-web-client:
    image: node:22
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ../../apps/web:/app
      - dlb_web_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      dlb-web-service:
        condition: service_started

volumes:
  mariadb_data:
  dlb_web_node_modules:
