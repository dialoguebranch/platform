# Dialogue Branch Web Service — Spring Boot configuration.
#
# Build-time values (version, buildTime) are injected from deployment.properties,
# which is updated by the Gradle tasks updateVersion and updateConfig.
#
# All dlb.* properties can be overridden at runtime via environment variables:
#   dlb.base-url                        → DLB_BASE_URL
#   dlb.mariadb.host                    → DLB_MARIADB_HOST
#   dlb.mariadb.password                → DLB_MARIADB_PASSWORD
#   dlb.auth.keycloak.base-url          → DLB_AUTH_KEYCLOAK_BASE_URL
#   dlb.auth.keycloak.client-id         → DLB_AUTH_KEYCLOAK_CLIENT_ID
#
# The defaults below are tuned for local development (compose-dev.yml).
# Production deployments must override all credentials via environment variables.

spring:
  config:
    import:
      - optional:classpath:deployment.properties
  datasource:
    url: jdbc:mariadb://${dlb.mariadb.host}:${dlb.mariadb.port}/${dlb.mariadb.database}?createDatabaseIfNotExist=true
    username: ${dlb.mariadb.user}
    password: ${dlb.mariadb.password}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    url: jdbc:mariadb://${dlb.mariadb.host}:${dlb.mariadb.port}/${dlb.mariadb.database}?createDatabaseIfNotExist=true
    user: ${dlb.mariadb.user}
    password: ${dlb.mariadb.password}
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    version: ${dlb.version}
    build-time: ${dlb.build-time}

server:
  port: 8089
  servlet:
    context-path: /dlb-web-service

springdoc:
  swagger-ui:
    operations-sorter: method
    tags-sorter: alpha
    oauth:
      client-id: dlb-web-service
      use-pkce-with-authorization-code-grant: true

# ----------------------------------------------------------------------------------
# Dialogue Branch Web Service configuration (all properties under the "dlb" prefix).
# ----------------------------------------------------------------------------------

dlb:
  # Populated from deployment.properties at build time
  version: ${version:unknown}
  build-time: ${buildTime:unknown}

  # Public base URL where this service is reachable
  base-url: http://localhost:8089/dlb-web-service

  # ---- CORS ----
  cors:
    allowed-origins:
      - http://localhost:5173

  # Filesystem path to the service data directory.
  # Relative paths resolve from the working directory (apps/api/ when using bootRun).
  # Override with DLB_DATA_DIR in production.
  data-dir: config

  # ---- Database ----
  mariadb:
    host: localhost
    port: 3306
    user: root
    # Default matches compose-dev.yml. Override with DLB_MARIADB_PASSWORD in production.
    password: dev
    database: dialoguebranch

  # ---- Authentication ----
  # The service is a pure OAuth2 resource server: it validates bearer tokens issued by Keycloak.
  auth:
    keycloak:
      base-url: http://localhost:8081/
      realm: dialoguebranch
      client-id: dlb-web-service

  # ---- External Variable Service ----
  external-variable-service:
    enabled: false
    url: ""
    api-version: 1
    api-key: ""

  # ---- Session ----
  # How long an in-memory UserService may sit idle before it's evicted (see
  # UserServiceExpirationService). A UserService is otherwise only removed by an explicit
  # /auth/logout call, so this bounds memory for clients that disconnect without logging out.
  session:
    idle-timeout-minutes: 60
