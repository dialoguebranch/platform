spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false;MODE=MySQL;NON_KEYWORDS=VALUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

dlb:
  base-url: http://localhost
  data-dir: ${user.dir}/src/test/resources/test-data
  auth:
    keycloak:
      base-url: http://localhost:8081/
      realm: dialoguebranch
      client-id: dlb-web-service
  cors:
    allowed-origins:
      - http://localhost:5173
