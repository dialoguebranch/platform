plugins {
	id 'base'
	id 'java'
	id 'java-library'
	id 'application'
	id 'distribution'
	id 'maven-publish'
	id 'signing'
	// Plugins for Publishing to the Sonatype Central Portal
	// See: https://gradleup.com/nmcp/
	id 'com.gradleup.nmcp' version '1.5.0'
	id 'com.gradleup.nmcp.aggregation' version '1.5.0'
}

group = 'com.dialoguebranch'
version = '1.3.0'

base {
	archivesName = 'dlb-core-java'
}

repositories {
	mavenCentral()
}

application {
	mainClass = "com.dialoguebranch.cli.CommandLineRunner"
}

run {
	standardInput = System.in
}

java {
	sourceCompatibility = JavaVersion.VERSION_17
	targetCompatibility = JavaVersion.VERSION_17
	if (project.properties['buildEnv'] == null || !project.properties['buildEnv'].equals('dev')) {
		withJavadocJar()
		withSourcesJar()
	}
}

javadoc {
	source = sourceSets.main.allJava
	destinationDir = reporting.baseDirectory.dir("javadoc").get().asFile
	include 'com/dialoguebranch/**'
	options.source = "17"
	options.addStringOption('Xmaxwarns', '1000')
}

dependencies {
	api "nl.rrd:rrd-utils:3.0.3"
	api 'com.fasterxml.jackson.module:jackson-modules-java8:2.18.0-rc1'
	testImplementation 'junit:junit:4.13.2'
	api 'org.slf4j:slf4j-api:2.0.16'
}

jar {
	manifest {
		attributes 'Main-Class': 'com.dialoguebranch.cli.CommandLineRunner'
		attributes 'Class-Path': configurations.compileClasspath.collect({ it.name }).join(' ')
	}
}

distributions {
	main {
		distributionBaseName = base.archivesName
		contents {
			from jar
		}
	}
}

[distZip, distTar, installDist]*.dependsOn jar

publishing {
	publications {
		maven(MavenPublication) {
			from components.java
			pom {
				name = 'Dialogue Branch Core Java Library'
				description = 'Dialogue Branch gives you creative freedom to write engaging interactive conversations...'
				url = 'https://www.dialoguebranch.com'
				packaging = 'jar'

				licenses {
					license {
						name = 'MIT License'
						url = 'https://opensource.org/licenses/MIT'
					}
				}
				developers {
					developer {
						id = 'hopdenakker'
						name = 'Harm op den Akker'
						email = 'hopdenakker@fruittreelabs.com'
						organizationUrl = 'https://dialoguebranch.com/'
					}
					developer {
						id = 'dhofs'
						name = 'Dennis Hofs'
						email = 'dennis.hofs@cube.nl'
						organizationUrl = 'https://cube.nl'
					}
				}
				scm {
					url = 'https://github.com/dialoguebranch/dlb-core-java/tree/main'
					connection = 'scm:git:git://github.com/dialoguebranch/dlb-core-java.git'
					developerConnection = 'scm:git:ssh://github.com:dialoguebranch/dlb-core-java.git'
				}
			}
		}
	}
}

signing {
	sign publishing.publications.maven
}

tasks.register('publishToMaven') {
	dependsOn 'publishAggregationToCentralPortal'
	group = 'publishing'
	description = 'Publishes this library to Maven Central via the Sonatype Central Portal.'
}

// use Gradle task 'publishToMaven'
nmcpAggregation {
	centralPortal {
		username = providers.gradleProperty('centralPortal.username')
		password = providers.gradleProperty('centralPortal.password')
		publishingType = 'AUTOMATIC'
	}
}

dependencies {
	nmcpAggregation project(path)
}